name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.3
      - run: make check
